# Gregnautics Continued — дефолты Shoulder Surfing Reloaded.
# Вид от третьего лица «как в GTA»: камера позади игрока, смещена вправо и чуть выше глаз.
# Остальные опции NeoForge дозаполнит значениями по умолчанию при первом запуске.
# Настраивается в игре: Mods -> Shoulder Surfing Reloaded -> Config,
# либо горячими клавишами смещения камеры (по умолчанию не назначены).

[camera]

	[camera.offset]
		# Смещение вправо (сток мода: -0.75). Отрицательное значение = камера за правым плечом.
		offset_x = -0.75
		# Высота камеры (сток мода: 0.0). Приподнято, чтобы вид был слегка сверху.
		offset_y = 0.3
		# Отдаление камеры (сток мода: 4.0).
		offset_z = 4.0
